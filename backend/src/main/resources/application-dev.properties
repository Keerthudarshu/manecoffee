# Development Configuration - Local MySQL
# Store uploaded files inside the backend project directory for local dev.
# Using an absolute path to the backend/uploads directory
spring.servlet.multipart.location=./uploads

# Multipart limits for local development
# Allow uploads up to 50MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Database Configuration - Local MySQL
spring.datasource.url=jdbc:mysql://manecoffe.cr8mqm2y8ap1.eu-north-1.rds.amazonaws.com:3306/manecoffee
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Logging Configuration
logging.level.com.manecoffee=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.hibernate=WARN

# Razorpay credentials (set these via environment variables or here for local testing)
razorpay.keyId=${RAZORPAY_KEY_ID:}
razorpay.keySecret=${RAZORPAY_KEY_SECRET:}
